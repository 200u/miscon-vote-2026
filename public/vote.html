<link rel="manifest" href="manifest.webmanifest">
<style>
:root{--ink:#0a0a0b;--charcoal:#131314;--text:rgba(248,250,251,.94);--muted:rgba(232,237,240,.66);--quiet:rgba(232,237,240,.46);--crimson:#a9142d;--crimson-soft:#b64255;--gold:#dcc58d;--gold-soft:rgba(220,197,141,.62);--serif:"Yu Mincho","Hiragino Mincho ProN",serif;--sans:"Yu Gothic",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{height:100%;overflow:hidden;background:radial-gradient(ellipse at 50% 36%,rgba(235,241,244,.18),transparent 34%),radial-gradient(ellipse at 50% 84%,rgba(235,241,244,.10),transparent 42%),radial-gradient(circle at 18% 10%,rgba(169,20,45,.055),transparent 30%),radial-gradient(circle at 84% 16%,rgba(220,197,141,.04),transparent 28%),linear-gradient(145deg,#1b1b1d 0%,#131314 48%,#08090a 100%)}body{font-family:var(--serif);color:var(--text);position:relative}body:before,body:after{content:"";position:fixed;inset:0;pointer-events:none;z-index:0}body:before{background:linear-gradient(112deg,transparent 0 14%,rgba(255,255,255,.07) 15%,transparent 25% 100%),linear-gradient(247deg,transparent 0 70%,rgba(255,255,255,.04) 72%,transparent 82% 100%),radial-gradient(ellipse at center,transparent 0 52%,rgba(0,0,0,.50) 100%)}body:after{opacity:.15;background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:72px 72px;mask-image:radial-gradient(ellipse at 50% 40%,#000 0 38%,transparent 76%)}
#smokeCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.92;mix-blend-mode:screen}.page{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;padding:clamp(16px,2vh,22px) clamp(22px,3vw,38px) clamp(14px,2vh,20px);gap:clamp(12px,1.7vh,18px);overflow:visible}header{flex:0 0 auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px;min-height:112px;position:relative}header:before{content:"";position:absolute;left:12%;right:12%;top:14px;height:76px;background:radial-gradient(ellipse at 50% 46%,rgba(248,250,251,.16),transparent 52%),radial-gradient(ellipse at 35% 52%,rgba(169,20,45,.035),transparent 44%);filter:blur(20px);opacity:.82;pointer-events:none}header:after{content:"";position:absolute;left:25%;right:25%;bottom:7px;height:1px;background:linear-gradient(90deg,transparent,rgba(169,20,45,.32),rgba(220,197,141,.30),transparent);opacity:.74}.header-left{display:flex;flex-direction:column;gap:4px;position:relative;z-index:1}.eyebrow{font-size:12px;font-style:italic;letter-spacing:.32em;color:var(--gold-soft);font-weight:300}.header-title{text-align:center;justify-self:center;padding:8px 30px 12px;position:relative;z-index:1}.title-main{font-size:clamp(34px,4.2vw,54px);font-weight:400;letter-spacing:.07em;line-height:1;text-shadow:0 0 18px rgba(255,255,255,.08),0 8px 28px rgba(0,0,0,.42)}.title-year{font-size:clamp(34px,4.35vw,56px);font-style:italic;font-weight:300;color:rgba(238,227,191,.94);margin-left:6px}.title-rule{width:min(270px,52vw);height:1px;background:linear-gradient(90deg,transparent,rgba(169,20,45,.34),rgba(255,255,255,.58),rgba(220,197,141,.32),transparent);margin:10px auto 6px;box-shadow:0 0 12px rgba(255,255,255,.08)}.title-sub{display:flex;flex-direction:column;align-items:center;gap:1px}.title-sub-main{font-size:clamp(14px,1.5vw,17px);letter-spacing:.2em;color:rgba(248,250,251,.82)}.title-sub-caption{font-size:clamp(10px,1.15vw,13px);font-style:italic;letter-spacing:.16em;color:rgba(220,197,141,.70)}.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;position:relative;z-index:1}.status-pill{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,.18);background:linear-gradient(135deg,rgba(255,255,255,.095),rgba(255,255,255,.035));padding:8px 14px;border-radius:999px;backdrop-filter:blur(16px) saturate(1.25);font-family:var(--sans);font-size:12px;letter-spacing:.12em;color:rgba(248,250,251,.76)}.status-dot{width:6px;height:6px;border-radius:50%;background:#8ee8c4;box-shadow:0 0 12px rgba(142,232,196,.75);flex-shrink:0}.status-dot.closed{background:var(--crimson-soft);box-shadow:0 0 10px rgba(185,74,92,.7)}.hint-note{font-size:12px;font-style:italic;letter-spacing:.08em;color:var(--quiet);text-align:right}
.grid{flex:1;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:clamp(12px,1.7vw,18px);max-width:1180px;width:100%;margin:0 auto;align-content:center;justify-content:center;overflow:visible;padding-top:8px}.card{display:flex;flex-direction:column;border:1px solid rgba(255,255,255,.26);border-radius:16px;background:linear-gradient(145deg,rgba(255,255,255,.19),rgba(255,255,255,.075) 52%,rgba(255,255,255,.035)),rgba(19,19,20,.46);overflow:hidden;cursor:pointer;position:relative;transition:border-color .25s,transform .25s,box-shadow .25s,background .25s;min-height:202px;max-height:272px;box-shadow:inset 0 1px 0 rgba(255,255,255,.28),inset 0 -1px 0 rgba(255,255,255,.06),0 18px 46px rgba(0,0,0,.25);backdrop-filter:blur(26px) saturate(1.16);color:var(--text);font:inherit;text-align:left}.card:hover{border-color:rgba(255,255,255,.34);transform:translateY(-2px);background:linear-gradient(145deg,rgba(255,255,255,.24),rgba(255,255,255,.095) 54%,rgba(169,20,45,.035)),rgba(19,19,20,.48);box-shadow:inset 0 1px 0 rgba(255,255,255,.34),0 20px 52px rgba(0,0,0,.30),0 0 0 1px rgba(220,197,141,.035)}.voting-closed .card{pointer-events:none;opacity:.38;filter:grayscale(.6)}.card-photo{flex:1 1 auto;position:relative;overflow:hidden;min-height:126px;margin:11px 11px 0;border-radius:12px;background:radial-gradient(circle at 50% 24%,rgba(255,255,255,.13),transparent 36%),linear-gradient(145deg,rgba(255,255,255,.07),rgba(255,255,255,.018));border:1px solid rgba(255,255,255,.24)}.card-photo:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18),transparent 34%),linear-gradient(0deg,rgba(9,11,13,.18),transparent 42%);pointer-events:none}.card-photo img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(.78) contrast(.95) brightness(1.06)}.photo-placeholder{position:absolute;inset:0;display:grid;place-items:center;padding:12px;text-align:center;font-family:var(--sans);font-size:12px;letter-spacing:.08em;color:rgba(248,250,251,.56);background:linear-gradient(145deg,rgba(255,255,255,.09),rgba(0,0,0,.12))}.card-label{padding:12px 16px 15px;border-top:1px solid rgba(255,255,255,.11);background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(0,0,0,.075));display:grid;grid-template-columns:auto minmax(0,1fr);align-items:baseline;gap:11px}.card-num{font-size:12px;font-style:italic;font-weight:300;color:var(--gold-soft);letter-spacing:.08em}.card-name{font-size:clamp(20px,2.15vw,28px);font-weight:500;letter-spacing:.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 12px rgba(0,0,0,.45)}.closed-banner{display:none;text-align:center;font-family:var(--sans);font-size:14px;font-weight:300;letter-spacing:.18em;padding:12px;border:1px solid rgba(185,74,92,.36);border-radius:16px;background:rgba(255,255,255,.06);color:rgba(248,250,251,.72);backdrop-filter:blur(14px) saturate(1.2)}.voting-closed .closed-banner{display:block}footer{text-align:center;font-size:11px;font-style:italic;color:rgba(232,237,240,.34);letter-spacing:.08em;flex-shrink:0}.error-banner{display:none;position:fixed;left:50%;top:14px;z-index:40;transform:translateX(-50%);max-width:min(680px,calc(100vw - 24px));border:1px solid rgba(185,74,92,.5);border-radius:12px;background:rgba(48,15,21,.92);color:var(--text);font-family:var(--sans);font-size:13px;padding:12px 16px;text-align:center}.error-banner.show{display:block}.version{position:fixed;right:12px;bottom:8px;z-index:5;font-family:var(--sans);font-size:10px;color:rgba(232,237,240,.42);letter-spacing:.04em}.modal-overlay,.thanks-overlay{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:rgba(4,7,10,.68);backdrop-filter:blur(18px) saturate(1.15);padding:24px}.modal-overlay.show,.thanks-overlay.show{display:flex}.modal-box,.thanks-card{width:min(520px,100%);border:1px solid rgba(255,255,255,.24);border-radius:18px;background:linear-gradient(145deg,rgba(255,255,255,.15),rgba(255,255,255,.065)),rgba(12,15,18,.72);padding:28px;text-align:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 32px 90px rgba(0,0,0,.48);backdrop-filter:blur(26px) saturate(1.45)}.modal-eyebrow{font-size:13px;font-style:italic;letter-spacing:.22em;color:rgba(248,250,251,.72);margin-bottom:14px}.modal-photo-wrap{width:168px;height:198px;margin:0 auto 15px;border:1px solid rgba(255,255,255,.2);border-radius:12px;overflow:hidden;background:rgba(255,255,255,.06);position:relative}.modal-photo-wrap img{width:100%;height:100%;object-fit:cover}.modal-rule,.thanks-rule{width:88px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.72),transparent);margin:0 auto 10px}.modal-candidate-num{font-size:13px;font-style:italic;color:var(--gold-soft);letter-spacing:.1em;margin-bottom:4px}.modal-candidate-name{font-size:clamp(30px,4vw,38px);font-weight:500;letter-spacing:.08em;margin-bottom:20px}.modal-question{font-family:var(--sans);font-size:12px;letter-spacing:.14em;color:rgba(248,250,251,.72);margin:18px 0}.modal-actions{display:flex;gap:12px}button{font-family:var(--sans);cursor:pointer}.btn-back,.btn-vote,.btn-next{border-radius:999px;padding:15px 13px;letter-spacing:.14em;border:1px solid rgba(255,255,255,.22)}.btn-back{flex:1;background:rgba(255,255,255,.06);color:rgba(248,250,251,.72)}.btn-vote{flex:2;background:linear-gradient(135deg,rgba(120,28,44,.88),rgba(158,56,72,.78));color:var(--text)}.btn-vote:disabled{opacity:.45;cursor:not-allowed}.btn-next{width:100%;background:rgba(248,250,251,.92);color:var(--ink);font-size:16px}.thanks-title{font-size:30px;font-weight:500;letter-spacing:.14em;margin-bottom:6px}.thanks-name{font-family:var(--sans);font-size:14px;letter-spacing:.12em;color:rgba(248,250,251,.76);margin:14px 0 20px}.thanks-mark{font-size:54px;color:#c8f1df;line-height:1;margin-bottom:10px}@media (orientation:portrait){html,body{overflow:auto}.page{height:auto;min-height:100vh}.grid{grid-template-columns:repeat(2,minmax(0,1fr));max-width:680px;align-content:start}.card{min-height:210px}.card-photo{min-height:140px}header{grid-template-columns:1fr;text-align:center}.header-left,.header-right{display:none}}@media(max-width:520px){.page{padding:10px}.grid{gap:10px}.card{border-radius:14px;min-height:170px}.card-photo{min-height:108px;border-radius:14px;margin:8px 8px 0}.card-name{font-size:17px}}
</style>
</head>
<body>
<canvas id="smokeCanvas"></canvas>
<div class="error-banner" id="errorBanner" role="alert"></div>
<div class="version" id="appVersion"></div>
<div class="page" id="page">
  <header>
    <div class="header-left"><span class="eyebrow">MISS MITOICHI</span><span style="font-size:13px;color:var(--muted);letter-spacing:.08em;">このiPad内に保存される投票です</span></div>
    <div class="header-title"><div class="title-main">ミス水戸一<span class="title-year">2026</span></div><div class="title-rule"></div><div class="title-sub"><span class="title-sub-main">投票フォーム</span><span class="title-sub-caption">Select Your Miss</span></div></div>
    <div class="header-right"><div class="status-pill"><span class="status-dot" id="statusDot"></span><span id="statusText">投票受付中</span></div><span class="hint-note">候補者を選んでタップ</span></div>
  </header>
  <div class="closed-banner" id="closedBanner">投票は締め切られています</div>
  <main class="grid" id="grid"></main>
  <footer id="footerTablet"></footer>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-eyebrow">この候補者に投票しますか？</div>
    <div class="modal-photo-wrap"><img id="modalPhoto" src="" alt=""></div>
    <div class="modal-rule"></div><div class="modal-candidate-num" id="modalNum"></div><div class="modal-candidate-name" id="modalName"></div>
    <div class="modal-question">押し間違いの場合は「戻る」を押してください</div>
    <div class="modal-actions"><button class="btn-back" onclick="closeConfirmModal()">戻る</button><button class="btn-vote" id="confirmVoteButton" onclick="submitVote()" disabled>投票する</button></div>
  </div>
</div>
<div class="thanks-overlay" id="thanks" onclick="readyNext(event)">
  <div class="thanks-card"><div class="thanks-mark">✓</div><div class="thanks-title">投票完了</div><div class="thanks-rule"></div><div class="thanks-name" id="thanksName"></div><button class="btn-next" onclick="readyNext(event)">投票画面に戻る</button></div>
</div>
<script src="shared.js"></script>
<script>
let selected=null;
function esc(s){return String(s).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function render(){
  const state=M26.loadState();
  const perf=M26.currentPerformance(state);
  document.getElementById('page').classList.toggle('voting-closed',!perf.votingOpen);
  document.getElementById('statusDot').className='status-dot'+(perf.votingOpen?'':' closed');
  document.getElementById('statusText').textContent='公演'+state.performanceId+' '+(perf.votingOpen?'投票受付中':'投票締切');
  document.getElementById('footerTablet').textContent='端末 '+state.deviceId+' / 公演 '+state.performanceId+' / 端末内票数 '+M26.totalVotes(state);
  document.getElementById('grid').innerHTML=M26.CANDIDATES.map(c=>`<button class="card" onclick="selectCandidate(${c.id})"><div class="card-photo"><img src="${c.photo}" alt="${esc(c.name)}" onerror="this.style.display='none'"></div><div class="card-label"><span class="card-num">No.${c.number}</span><span class="card-name">${esc(c.name)}</span></div></button>`).join('');
}
function selectCandidate(id){
  const state=M26.loadState();
  if(!M26.currentPerformance(state).votingOpen) return;
  selected=M26.CANDIDATES.find(c=>c.id===id);
  document.getElementById('modalNum').textContent='No.'+selected.number;
  document.getElementById('modalName').textContent=selected.name;
  document.getElementById('modalPhoto').src=selected.photo;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');selected=null}
function submitVote(){if(!selected)return;try{M26.addVote(selected.id);closeModal();document.getElementById('thanksName').textContent=selected.name+' に投票しました';document.getElementById('thanks').classList.add('show');render()}catch(e){alert(e.message)}}
function readyNext(e){if(e)e.stopPropagation();document.getElementById('thanks').classList.remove('show');selected=null}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
render();
</script>
<script>
(function(){const canvas=document.getElementById('smokeCanvas'),ctx=canvas.getContext('2d'),reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;let W,H;function resize(){const dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}resize();addEventListener('resize',resize);const streams=Array.from({length:reduce?5:12},(_,i)=>({seed:Math.random()*1000,offset:(i-6)*24+(Math.random()*24-12),length:185+Math.random()*160,sway:18+Math.random()*34,drift:Math.random()*32-16,width:18+Math.random()*30,alpha:.026+Math.random()*.032,speed:.09+Math.random()*.14}));function path(s,t,side){const bx=W*.5+s.offset+Math.sin(t*.08+s.seed)*W*.035,by=H*.82+Math.cos(t*.1+s.seed)*16;ctx.beginPath();for(let i=0;i<=22;i++){const p=i/22,tp=Math.sin(p*Math.PI),wave=Math.sin(p*6.4+t*s.speed+s.seed)*s.sway*tp+Math.sin(p*12.2-t*.13+s.seed*.7)*s.sway*.34*tp,x=bx+wave+side*tp*(10+24*p)+s.drift*p,y=by-p*s.length-p*p*60;i?ctx.lineTo(x,y):ctx.moveTo(x,y)}return{bx,by}}function draw(s,t){ctx.save();ctx.globalCompositeOperation='screen';[-1,0,1].forEach((side,i)=>{const p=path(s,t+i*.31,side),g=ctx.createLinearGradient(p.bx,p.by,p.bx+s.drift,p.by-s.length-92);g.addColorStop(0,'rgba(224,229,232,0)');g.addColorStop(.2,'rgba(224,229,232,'+(s.alpha*(i? .5:.86))+')');g.addColorStop(.58,'rgba(224,229,232,'+(s.alpha*(i? .3:.52))+')');g.addColorStop(1,'rgba(224,229,232,0)');ctx.strokeStyle=g;ctx.lineCap='round';ctx.lineJoin='round';ctx.lineWidth=s.width*(i? .52:1);ctx.filter='blur('+(i?12:18)+'px)';ctx.stroke()});ctx.restore()}function loop(now){const t=now*.001;ctx.clearRect(0,0,W,H);const g=ctx.createRadialGradient(W*.5,H*.58,0,W*.5,H*.58,Math.min(W,H)*.64);g.addColorStop(0,'rgba(255,255,255,.09)');g.addColorStop(.38,'rgba(255,255,255,.042)');g.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);streams.forEach(s=>draw(s,reduce?0:t));if(!reduce)requestAnimationFrame(loop)}requestAnimationFrame(loop)})();
</script>
</body>
</html>
