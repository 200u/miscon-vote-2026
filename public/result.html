<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>端末結果 | ミス水戸一2026</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{--ink:#090b0d;--crimson:#a9142d;--crimson-bright:#b64255;--gold:#dcc58d;--gold-light:#eee3bf;--text:rgba(248,250,251,.94);--muted:rgba(232,237,240,.62);--serif:"Yu Mincho","Hiragino Mincho ProN",serif;--sans:"Yu Gothic",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden;background:radial-gradient(ellipse at 50% 36%,rgba(235,241,244,.17),transparent 34%),radial-gradient(ellipse at 50% 84%,rgba(235,241,244,.09),transparent 42%),radial-gradient(circle at 16% 8%,rgba(169,20,45,.05),transparent 31%),radial-gradient(circle at 88% 18%,rgba(220,197,141,.035),transparent 30%),linear-gradient(145deg,#1b1b1d 0%,#131314 48%,#08090a 100%);color:var(--text);font-family:var(--serif)}#smokeCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.88;mix-blend-mode:screen}.page{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;padding:24px 44px 28px}.page-top{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.18);margin-bottom:18px}.eyebrow{font-size:11px;font-style:italic;letter-spacing:.32em;color:rgba(213,189,133,.52);font-weight:300}.top-left h1{font-size:clamp(32px,4.4vw,62px);font-weight:300;letter-spacing:.08em;line-height:1;margin-top:4px}.top-left h1 em{font-style:italic}.top-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px}.total-label{font-size:12px;font-style:italic;letter-spacing:.18em;color:var(--muted)}.total-num{font-size:42px;font-weight:300;line-height:1}.total-unit{font-size:16px;margin-left:4px;color:var(--muted)}.status-pill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.17);background:linear-gradient(135deg,rgba(255,255,255,.09),rgba(255,255,255,.035));padding:7px 13px;border-radius:999px;backdrop-filter:blur(16px) saturate(1.25);font-family:var(--sans);font-size:10px;letter-spacing:.16em;color:var(--muted)}.s-dot{width:5px;height:5px;border-radius:50%;background:#8ee8c4;box-shadow:0 0 10px rgba(142,232,196,.7)}.s-dot.closed{background:var(--crimson-bright);box-shadow:0 0 8px var(--crimson-bright)}.chart{flex:1;display:flex;flex-direction:column;gap:10px;overflow:hidden;justify-content:center}.row{display:grid;grid-template-columns:56px minmax(160px,260px) 1fr 80px;gap:14px;align-items:center;animation:rowIn .5s cubic-bezier(.3,1,.4,1) both}@keyframes rowIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:none}}.rank-badge{width:46px;height:46px;border:1px solid rgba(255,255,255,.26);border-radius:10px;background:rgba(255,255,255,.105);backdrop-filter:blur(18px) saturate(1.12);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:300;color:var(--muted)}.rank-badge.r1{border-color:rgba(220,197,141,.56);color:rgba(238,227,191,.86);font-size:26px}.candidate-info{display:flex;align-items:center;gap:10px;min-width:0;overflow:hidden}.candidate-photo{width:50px;height:50px;border:1px solid rgba(255,255,255,.25);border-radius:10px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.055)}.candidate-name{font-size:clamp(18px,2.4vw,30px);font-weight:300;letter-spacing:.1em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.candidate-num{font-size:11px;font-style:italic;color:rgba(213,189,133,.68);margin-bottom:2px}.bar-track{height:50px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.22);border-radius:999px;position:relative;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.20),0 12px 30px rgba(0,0,0,.12);backdrop-filter:blur(16px) saturate(1.14)}.bar-fill{height:100%;min-width:3px;transition:width .6s cubic-bezier(.2,1,.2,1);background:linear-gradient(90deg,rgba(126,31,48,.56),rgba(185,74,92,.36),rgba(255,255,255,.24));border-radius:inherit}.bar-fill.r1{background:linear-gradient(90deg,rgba(126,31,48,.58),rgba(185,74,92,.38),rgba(213,189,133,.30))}.vote-count{text-align:right;font-size:clamp(24px,3vw,42px);font-weight:300;line-height:1}.vote-unit{display:block;font-size:11px;font-style:italic;color:var(--muted);letter-spacing:.08em}@media(max-height:700px){.page{padding:16px 32px 18px}.chart{gap:6px}.rank-badge,.candidate-photo{width:38px;height:38px}.bar-track{height:40px}.row{grid-template-columns:44px minmax(130px,220px) 1fr 70px}}@media(max-width:760px){html,body{overflow:auto}.page{height:auto;min-height:100vh;padding:18px}.page-top{display:block}.top-right{align-items:flex-start;text-align:left;margin-top:14px}.row{grid-template-columns:42px 1fr 70px}.bar-track{grid-column:2/4}.candidate-photo{display:none}}
</style>
</head>
<body>
<canvas id="smokeCanvas"></canvas>
<div class="page">
  <div class="page-top">
    <div class="top-left"><div class="eyebrow">MISS MITOICHI 2026 - DEVICE RESULT</div><h1>端末内結果 <em id="deviceId"></em></h1></div>
    <div class="top-right"><div class="total-label">端末内総投票数</div><div class="total-num"><span id="totalVotes">0</span><span class="total-unit">票</span></div><div class="status-pill"><span class="s-dot" id="sDot"></span><span id="sText">投票受付中</span></div></div>
  </div>
  <div class="chart" id="chart"></div>
</div>
<script src="shared.js"></script>
<script>
function render(){
  const state=M26.loadState(), perf=M26.currentPerformance(state), ranking=M26.rankingFromCounts(perf.counts), max=Math.max(1,...perf.counts);
  document.getElementById('deviceId').textContent='端末 '+state.deviceId+' / 公演 '+state.performanceId;
  document.getElementById('totalVotes').textContent=M26.totalVotes(state);
  document.getElementById('sDot').className='s-dot'+(perf.votingOpen?'':' closed');
  document.getElementById('sText').textContent=perf.votingOpen?'投票受付中':'投票締切';
  document.getElementById('chart').innerHTML=ranking.map((c,i)=>{
    const pct=c.votes===0?1:c.votes/max*100;
    return `<div class="row" style="animation-delay:${i*.04}s"><div class="rank-badge ${c.rank===1?'r1':''}">${c.rank}</div><div class="candidate-info"><img class="candidate-photo" src="${c.photo}" alt=""><div><div class="candidate-num">No.${c.number}</div><div class="candidate-name">${c.name}</div></div></div><div class="bar-track"><div class="bar-fill ${c.rank===1?'r1':''}" style="width:${pct}%"></div></div><div class="vote-count">${c.votes}<span class="vote-unit">票</span></div></div>`;
  }).join('');
}
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
render();setInterval(render,2000);
</script>
<script>
(function(){const canvas=document.getElementById('smokeCanvas'),ctx=canvas.getContext('2d'),reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;let W,H;function resize(){const dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}resize();addEventListener('resize',resize);const streams=Array.from({length:reduce?5:11},(_,i)=>({seed:Math.random()*1000,offset:(i-5)*24+(Math.random()*24-12),length:180+Math.random()*150,sway:18+Math.random()*32,drift:Math.random()*30-15,width:18+Math.random()*28,alpha:.024+Math.random()*.03,speed:.09+Math.random()*.13}));function path(s,t,side){const bx=W*.52+s.offset+Math.sin(t*.08+s.seed)*W*.03,by=H*.82+Math.cos(t*.1+s.seed)*14;ctx.beginPath();for(let i=0;i<=22;i++){const p=i/22,tp=Math.sin(p*Math.PI),wave=Math.sin(p*6.4+t*s.speed+s.seed)*s.sway*tp+Math.sin(p*12-t*.13+s.seed*.7)*s.sway*.3*tp,x=bx+wave+side*tp*(10+22*p)+s.drift*p,y=by-p*s.length-p*p*58;i?ctx.lineTo(x,y):ctx.moveTo(x,y)}return{bx,by}}function draw(s,t){ctx.save();ctx.globalCompositeOperation='screen';[-1,0,1].forEach((side,i)=>{const p=path(s,t+i*.29,side),g=ctx.createLinearGradient(p.bx,p.by,p.bx+s.drift,p.by-s.length-82);g.addColorStop(0,'rgba(224,229,232,0)');g.addColorStop(.23,'rgba(224,229,232,'+(s.alpha*(i?.48:.84))+')');g.addColorStop(.62,'rgba(224,229,232,'+(s.alpha*(i?.28:.5))+')');g.addColorStop(1,'rgba(224,229,232,0)');ctx.strokeStyle=g;ctx.lineWidth=s.width*(i?.52:1);ctx.filter='blur('+(i?12:18)+'px)';ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke()});ctx.restore()}function loop(now){const t=now*.001;ctx.clearRect(0,0,W,H);const g=ctx.createRadialGradient(W*.52,H*.58,0,W*.52,H*.58,Math.min(W,H)*.62);g.addColorStop(0,'rgba(255,255,255,.086)');g.addColorStop(.42,'rgba(255,255,255,.040)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);streams.forEach(s=>draw(s,reduce?0:t));if(!reduce)requestAnimationFrame(loop)}requestAnimationFrame(loop)})();
</script>
</body>
</html>
