<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>投票 | M26</title>
<link rel="manifest" href="./manifest.webmanifest">
<style>
:root{--bg:#111315;--panel:#1b1f23;--text:#f7f7f4;--muted:#bfc4c7;--line:rgba(255,255,255,.16);--accent:#b2293d;--gold:#d8c48b;--ok:#63d6a2;--sans:"Yu Gothic",system-ui,sans-serif;--serif:"Yu Mincho","Hiragino Mincho ProN",serif}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% 0,rgba(216,196,139,.12),transparent 34%),linear-gradient(145deg,#202326,#111315 55%,#070809);color:var(--text);font-family:var(--sans);-webkit-tap-highlight-color:transparent}button{font:inherit;color:inherit}.page{min-height:100vh;display:flex;flex-direction:column;padding:20px clamp(16px,3vw,34px);gap:16px}.top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}.brand{text-align:center;font-family:var(--serif);letter-spacing:.08em}.brand .main{font-size:clamp(28px,5vw,48px)}.brand .sub{font-size:13px;color:var(--gold);font-style:italic}.pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.07);padding:9px 13px;font-size:12px;color:var(--muted)}.dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 12px var(--ok)}.dot.closed{background:#d66070;box-shadow:0 0 12px #d66070}.admin-link{justify-self:start;color:rgba(247,247,244,.56);text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:12px}.count-note{justify-self:end;color:var(--muted);font-size:13px}.closed{display:none;text-align:center;border:1px solid rgba(214,96,112,.4);border-radius:12px;background:rgba(214,96,112,.1);padding:14px;color:#ffd0d6}.is-closed .closed{display:block}.grid{flex:1;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;align-content:center}.card{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:rgba(255,255,255,.075);box-shadow:0 18px 45px rgba(0,0,0,.22);padding:0;text-align:left;cursor:pointer;min-height:240px}.card:active{transform:scale(.99)}.is-closed .card{opacity:.38;pointer-events:none}.photo{position:relative;height:178px;background:#252a2f;display:grid;place-items:center;overflow:hidden}.photo img{width:100%;height:100%;object-fit:cover;display:block}.photo img.missing{display:none}.fallback{position:absolute;inset:0;display:grid;place-items:center;text-align:center;color:#f1d4d8;background:linear-gradient(145deg,#2b3035,#171a1d);padding:12px;font-weight:700;line-height:1.7}.label{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:baseline;padding:14px 16px}.num{font-family:var(--serif);color:var(--gold);font-style:italic}.name{font-family:var(--serif);font-size:clamp(22px,2.4vw,31px);letter-spacing:.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.message{min-height:22px;text-align:center;color:#ffd0d6;font-weight:700}.modal,.thanks{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.68);backdrop-filter:blur(12px);padding:20px;z-index:10}.modal.show,.thanks.show{display:flex}.dialog{width:min(520px,100%);border:1px solid var(--line);border-radius:16px;background:#171b1f;padding:24px;text-align:center;box-shadow:0 28px 80px rgba(0,0,0,.5)}.modal-photo{position:relative;width:180px;height:220px;margin:0 auto 16px;border-radius:12px;overflow:hidden;background:#252a2f}.modal-photo img{width:100%;height:100%;object-fit:cover}.modal-photo img.missing{display:none}.modal-name{font-family:var(--serif);font-size:36px;letter-spacing:.08em;margin:4px 0 12px}.modal-num{color:var(--gold);font-style:italic}.actions{display:flex;gap:10px}.actions button,.next{border:1px solid var(--line);border-radius:999px;padding:15px 16px;background:rgba(255,255,255,.08);cursor:pointer}.vote{flex:2;background:linear-gradient(135deg,#8c2030,#c34658)!important}.back{flex:1}.vote:disabled{opacity:.45;cursor:not-allowed}.thanks .mark{font-size:52px;color:var(--ok)}.thanks h2{font-family:var(--serif);font-weight:400;font-size:34px;margin:8px 0 10px}.staff-note{position:fixed;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);color:rgba(255,255,255,.52);font-size:12px;text-align:center;padding:5px 10px;letter-spacing:.04em;z-index:5}.app-version{position:fixed;right:10px;bottom:8px;color:rgba(255,255,255,.22);font-size:10px;z-index:6}
@media(max-width:900px){.top{grid-template-columns:1fr}.admin-link,.count-note{justify-self:center}.grid{grid-template-columns:repeat(2,minmax(0,1fr));align-content:start}.photo{height:160px}}@media(max-width:520px){.page{padding:12px}.grid{gap:10px}.card{min-height:190px}.photo{height:128px}.label{padding:11px}.name{font-size:20px}}
</style>
</head>
<body>
<div class="page" id="page">
  <header class="top">
    <a class="admin-link" href="./admin.html?v=20260620-final">管理</a>
    <div class="brand"><div class="sub">MISS MITOICHI 2026</div><div class="main">投票フォーム</div><div class="pill"><span class="dot" id="statusDot"></span><span id="statusText">確認中</span></div></div>
    <div></div>
  </header>
  <div class="closed">投票は締め切られています。スタッフに確認してください。</div>
  <div class="message" id="message"></div>
  <main class="grid" id="grid"></main>
</div>

<div class="modal" id="modal" role="dialog" aria-modal="true">
  <div class="dialog">
    <div class="modal-photo"><div class="fallback" id="modalFallback"></div><img id="modalPhoto" alt=""></div>
    <div class="modal-num" id="modalNum"></div>
    <div class="modal-name" id="modalName"></div>
    <p>この候補者に投票します。よろしいですか？</p>
    <div class="actions"><button class="back" type="button" onclick="closeModal()">戻る</button><button class="vote" id="voteSubmitButton" type="button" onclick="submitVote()">投票する</button></div>
  </div>
</div>

<div class="thanks" id="thanks">
  <div class="dialog">
    <div class="mark">✓</div>
    <h2>投票しました</h2>
    <p id="thanksName"></p>
    <button class="next" type="button" onclick="readyNext()">次の投票へ</button>
  </div>
</div>
<div class="staff-note" id="localTotal">端末 -- / 公演 - / 端末内投票数 0票</div>
<div class="app-version">App version: 20260620-final</div>
<script src="./shared.js?v=20260620-final"></script>
<script>
let selectedCandidate = null;

function setMessage(text) {
  document.getElementById('message').textContent = text || '';
}

function renderPhoto(candidate) {
  return '<div class="photo"><div class="fallback">' + M26.esc(candidate.name) + '<br>写真未読込</div><img src="' + M26.esc(candidate.photo) + '" alt="' + M26.esc(candidate.name) + '" onerror="this.classList.add(\'missing\')"></div>';
}

function render() {
  const state = M26.loadState();
  const perf = M26.currentPerformance(state);
  document.getElementById('page').classList.toggle('is-closed', !perf.votingOpen);
  document.getElementById('statusDot').className = 'dot' + (perf.votingOpen ? '' : ' closed');
  document.getElementById('statusText').textContent = perf.votingOpen ? '受付中' : '締切';
  document.getElementById('localTotal').textContent = '端末 ' + state.deviceId + ' / 公演 ' + state.performanceId + ' / 端末内投票数 ' + M26.totalVotes(state) + '票';
  document.getElementById('grid').innerHTML = M26.CANDIDATES.map(candidate =>
    '<button class="card" type="button" data-id="' + M26.esc(candidate.id) + '" onclick="selectCandidateFromButton(this)">' +
    renderPhoto(candidate) +
    '<div class="label"><span class="num">No.' + candidate.number + '</span><span class="name">' + M26.esc(candidate.name) + '</span></div></button>'
  ).join('');
}

function selectCandidateFromButton(button) {
  const candidateId = button && button.dataset ? button.dataset.id : '';
  const candidate = M26.CANDIDATES.find(c => c.id === candidateId);
  if (!candidate) {
    selectedCandidate = null;
    setMessage('候補者データを読み込めませんでした。画面を再読み込みしてください。');
    return;
  }
  selectCandidate(candidate.id);
}

function selectCandidate(candidateId) {
  const state = M26.loadState();
  if (!M26.currentPerformance(state).votingOpen) return;
  const candidate = M26.CANDIDATES.find(c => c.id === candidateId);
  if (!candidate) {
    selectedCandidate = null;
    setMessage('候補者が見つかりません。もう一度選び直してください。');
    return;
  }
  selectedCandidate = candidate;
  setMessage('');
  openConfirmModal(candidate);
}

function openConfirmModal(candidate) {
  document.getElementById('modalNum').textContent = 'No.' + candidate.number;
  document.getElementById('modalName').textContent = candidate.name;
  document.getElementById('modalFallback').innerHTML = M26.esc(candidate.name) + '<br>写真未読込';
  const img = document.getElementById('modalPhoto');
  img.classList.remove('missing');
  img.onerror = function () { this.classList.add('missing'); };
  img.src = candidate.photo;
  document.getElementById('voteSubmitButton').disabled = false;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('voteSubmitButton').disabled = true;
  selectedCandidate = null;
}

function submitVote() {
  const button = document.getElementById('voteSubmitButton');
  const candidate = selectedCandidate;
  if (!candidate || !M26.CANDIDATES.some(c => c.id === candidate.id)) {
    setMessage('候補者が選択されていません。投票せずに戻りました。');
    closeModal();
    return;
  }
  button.disabled = true;
  try {
    M26.addVote(candidate.id);
    document.getElementById('modal').classList.remove('show');
    document.getElementById('thanksName').textContent = candidate.name + 'に投票しました。';
    selectedCandidate = null;
    render();
    document.getElementById('thanks').classList.add('show');
  } catch (err) {
    setMessage(err && err.message ? err.message : '投票を保存できませんでした。');
    selectedCandidate = null;
    document.getElementById('modal').classList.remove('show');
  } finally {
    button.disabled = false;
  }
}

function readyNext() {
  selectedCandidate = null;
  document.getElementById('thanks').classList.remove('show');
  setMessage('');
}

document.addEventListener('keydown', event => {
  if (event.key === 'Escape') closeModal();
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js?v=20260620-final').catch(() => {});
render();
</script>
</body>
</html>
